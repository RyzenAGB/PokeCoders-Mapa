<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Motor AR - PokeCoders</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* CSS BLINDADO PARA EVITAR BUGS VISUALES Y FRANJAS BLANCAS */
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden; /* Adiós al scroll accidental */
      background-color: #000; /* Fondo negro por si la cámara tarda en cargar */
    }

    #vista-ar {
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
    }

    /* Botón elegante para salir de la AR */
    #btn-cerrar-ar {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      padding: 15px 30px;
      background-color: #1b365d; /* Azul Unicaribe */
      color: white;
      border-radius: 30px;
      border: 2px solid #009eb3; /* Borde Cerceta */
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 6px 15px rgba(0,0,0,0.4);
      cursor: pointer;
    }
    
    #btn-cerrar-ar:active {
      transform: translateX(-50%) scale(0.95);
      background-color: #009eb3;
    }
  </style>
</head>
<body>

  <button id="btn-cerrar-ar" onclick="cerrarAR()">⬅ Volver al Mapa 2D</button>

  <div id="vista-ar">
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes;" 
      embedded 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-camera>
      
      <a-entity mindar-image-target="targetIndex: 0">
        
<a-plane class="clickable" position="-0.28 0.18 0.01" width="0.15" height="0.05" color="#914AC8" opacity="0.9" 
               onclick="window.parent.mostrarInfo('edificio-e')">
        <a-text value="INFO EDIF. E" align="center" position="0 0 0.02" scale="0.1 0.1 0.1"></a-text>
      </a-plane>

      <a-plane class="clickable" position="-0.15 0.08 0.01" width="0.15" height="0.05" color="#C88D4A" opacity="0.9" 
               onclick="window.parent.mostrarInfo('edificio-c')">
        <a-text value="INFO EDIF. C" align="center" position="0 0 0.02" scale="0.1 0.1 0.1"></a-text>
      </a-plane>

      <a-plane class="clickable" position="-0.02 -0.02 0.01" width="0.15" height="0.05" color="#40832F" opacity="0.9" 
               onclick="window.parent.mostrarInfo('edificio-b')">
        <a-text value="INFO EDIF. B" align="center" position="0 0 0.02" scale="0.1 0.1 0.1"></a-text>
      </a-plane>

      <a-plane class="clickable" position="0.15 -0.08 0.01" width="0.15" height="0.05" color="#EDC045" opacity="0.9" 
               onclick="window.parent.mostrarInfo('edificio-a')">
        <a-text value="INFO EDIF. A" align="center" position="0 0 0.02" scale="0.1 0.1 0.1"></a-text>
      </a-plane>

      <a-plane class="clickable" position="0.32 -0.05 0.01" width="0.15" height="0.05" color="#A12E60" opacity="0.9" 
               onclick="window.parent.mostrarInfo('edificio-d')">
        <a-text value="INFO EDIF. D" align="center" position="0 0 0.02" scale="0.1 0.1 0.1"></a-text>
      </a-plane>

      <a-plane class="clickable" position="-0.22 -0.15 0.01" width="0.15" height="0.05" color="#385B89" opacity="0.9" 
               onclick="window.parent.mostrarInfo('edificio-g')">
        <a-text value="INFO EDIF. G" align="center" position="0 0 0.02" scale="0.1 0.1 0.1"></a-text>
      </a-plane>

      <a-plane class="clickable" position="-0.08 -0.18 0.01" width="0.15" height="0.05" color="#54A6A9" opacity="0.9" 
               onclick="window.parent.mostrarInfo('edificio-f')">
        <a-text value="INFO EDIF. F" align="center" position="0 0 0.02" scale="0.1 0.1 0.1"></a-text>
      </a-plane>

      <a-plane class="clickable" position="0.22 -0.22 0.01" width="0.15" height="0.05" color="#ADADAD" opacity="0.9" 
               onclick="window.parent.mostrarInfo('estacionamientos')">
        <a-text value="INFO ESTAC." align="center" position="0 0 0.02" scale="0.1 0.1 0.1"></a-text>
      </a-plane>

      </a-entity>
    </a-scene>
  </div>

  <script>
    // Esta función puente se asegura de que la AR no se rompa si la pruebas sola.
    // Si la app está embebida en el index.html principal, llamará a la función del Dev 3.
    function comunicarInfo(idEdificio) {
      if (window.parent && typeof window.parent.mostrarInfo === 'function') {
        // Llama a la función del index.html para abrir la tarjeta de información
        window.parent.mostrarInfo(idEdificio);
      } else {
        // Si estás probando la AR sola en tu celular, te avisa que el clic funciona perfecto
        alert("Clic detectado en: " + idEdificio + "\n(Para ver los datos reales, abre la app desde el index.html)");
      }
    }

    function cerrarAR() {
      if (window.parent && typeof window.parent.desactivarAR === 'function') {
        window.parent.desactivarAR();
      } else {
        alert("Simulando volver al Mapa 2D");
      }
    }
        // Esta función debe estar en tu script principal
    function mostrarInfo(idEdificio) {
        // 1. Buscar el edificio en la base de datos del archivo datos.js
        const edificio = universidadData[idEdificio];

        if (edificio) {
            // 2. Insertar los datos en el Modal
            document.getElementById('modal-titulo').innerText = edificio.nombre; //
            document.getElementById('modal-servicios').innerText = edificio.servicios; //
            document.getElementById('modal-contacto').innerText = edificio.contactos; //
            document.getElementById('modal-horarios').innerText = edificio.horarios; //

            // 3. Mostrar el modal (animación de subida)
            document.getElementById('modal-info').classList.add('activo');
        } else {
            console.error("No se encontraron datos para el ID: " + idEdificio);
        }
    }
  </script>
</body>
</html>
