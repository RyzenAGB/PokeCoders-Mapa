<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Motor AR - PokeCoders</title>
  <link rel="stylesheet" href="servicios.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script>
    AFRAME.registerComponent('edificio-click', {
      schema: {type: 'string'},
      init: function () {
        const idEdificio = this.data;
        
        // Escucha el clic normal
        this.el.addEventListener('click', function(e) {
          e.preventDefault();
          window.mostrarInfo(idEdificio);
        });

        // Respaldo de fuerza bruta para toques de celular rebeldes
        this.el.addEventListener('touchstart', function(e) {
          e.preventDefault();
          window.mostrarInfo(idEdificio);
        });
      }
    });
  </script>

  <style>
    /* 🚨 FIX 1: Bloqueamos la acción del navegador para que no robe el toque 🚨 */
    html, body {
      margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000;
      touch-action: none; 
    }
    #vista-ar {
      width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 10;
    }
    
    /* Desintegramos cualquier barrera invisible de MindAR */
    .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-compatibility {
      display: none !important;
      pointer-events: none !important;
    }
    .a-canvas {
      pointer-events: auto !important;
    }

    /* MODAL BLANCO */
    #modal-info {
      position: fixed; bottom: -100%; left: 0; right: 0; background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
      border-radius: 20px 20px 0 0; padding: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
      z-index: 99999; transition: bottom 0.3s ease-out; max-height: 60vh; overflow-y: auto; pointer-events: auto;
    }
    #modal-info.activo { bottom: 0; }
    #modal-info h2 { margin: 0 0 15px 0; color: #1b365d; font-size: 20px; font-weight: bold; }
    #modal-info p { margin: 10px 0; color: #333; line-height: 1.6; font-size: 14px; }
    .modal-close {
      position: absolute; top: 15px; right: 15px; background: #009eb3; color: white; border: none;
      border-radius: 50%; width: 35px; height: 35px; font-size: 20px; cursor: pointer; font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="modal-info">
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <h2 id="modal-titulo">Cargando...</h2>
    <p><strong style="color: #1b365d;">Servicios:</strong><br><span id="modal-servicios"></span></p>
    <p><strong style="color: #1b365d;">Contactos:</strong><br><span id="modal-contacto"></span></p>
    <p><strong style="color: #1b365d;">Horarios:</strong><br><span id="modal-horarios"></span></p>
  </div>

  <div id="vista-ar">
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
      embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>
      
      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-plane class="clickable" position="-0.28 0.18 0.01" width="0.15" height="0.05" color="#914AC8" opacity="0.9" edificio-click="Edificio_E">
          <a-text value="INFO EDIF. E" align="center" position="0 0 0.02" scale="0.1 0.1 0.1" color="white"></a-text>
        </a-plane>

        <a-plane class="clickable" position="-0.15 0.08 0.01" width="0.15" height="0.05" color="#C88D4A" opacity="0.9" edificio-click="Edificio_C">
          <a-text value="INFO EDIF. C" align="center" position="0 0 0.02" scale="0.1 0.1 0.1" color="white"></a-text>
        </a-plane>

        <a-plane class="clickable" position="-0.02 -0.02 0.01" width="0.15" height="0.05" color="#40832F" opacity="0.9" edificio-click="Edificio_B">
          <a-text value="INFO EDIF. B" align="center" position="0 0 0.02" scale="0.1 0.1 0.1" color="white"></a-text>
        </a-plane>

        <a-plane class="clickable" position="0.15 -0.08 0.01" width="0.15" height="0.05" color="#EDC045" opacity="0.9" edificio-click="Edificio_A">
          <a-text value="INFO EDIF. A" align="center" position="0 0 0.02" scale="0.1 0.1 0.1" color="white"></a-text>
        </a-plane>

        <a-plane class="clickable" position="0.32 -0.05 0.01" width="0.15" height="0.05" color="#A12E60" opacity="0.9" edificio-click="Edificio_D">
          <a-text value="INFO EDIF. D" align="center" position="0 0 0.02" scale="0.1 0.1 0.1" color="white"></a-text>
        </a-plane>

        <a-plane class="clickable" position="-0.22 -0.15 0.01" width="0.15" height="0.05" color="#385B89" opacity="0.9" edificio-click="Edificio G">
          <a-text value="INFO EDIF. G" align="center" position="0 0 0.02" scale="0.1 0.1 0.1" color="white"></a-text>
        </a-plane>

        <a-plane class="clickable" position="-0.08 -0.18 0.01" width="0.15" height="0.05" color="#54A6A9" opacity="0.9" edificio-click="Edificio_F">
          <a-text value="INFO EDIF. F" align="center" position="0 0 0.02" scale="0.1 0.1 0.1" color="white"></a-text>
        </a-plane>

        <a-plane class="clickable" position="0.22 -0.22 0.01" width="0.15" height="0.05" color="#ADADAD" opacity="0.9" edificio-click="Estacionamiento_1">
          <a-text value="INFO ESTAC." align="center" position="0 0 0.02" scale="0.1 0.1 0.1" color="white"></a-text>
        </a-plane>

      </a-entity>
    </a-scene>
  </div>
  <script src="datos.js"></script>
  <script>
    // Se asegura de que la función sea global (window)
    window.mostrarInfo = function(idEdificio) {
      // Intentar leer la base de datos
      if (typeof universidadData === 'undefined') {
        alert("🚨 Error Crítico: No se pudo cargar el archivo datos.js");
        return;
      }

      const edificio = universidadData[idEdificio];

      if (edificio) {
        document.getElementById('modal-titulo').innerText = edificio.nombre;
        document.getElementById('modal-servicios').innerText = edificio.servicios;
        document.getElementById('modal-contacto').innerText = edificio.contactos;
        document.getElementById('modal-horarios').innerText = edificio.horarios;

        document.getElementById('modal-info').classList.add('activo');
      } else {
        alert("🚨 Bug: Se hizo clic, pero no se halló el ID: '" + idEdificio + "' en datos.js");
      }
    };

    window.cerrarModal = function() {
      document.getElementById('modal-info').classList.remove('activo');
    };
  </script>

  <!-- NAV INFERIOR -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Mapa</span>
      <div class="nav-dot"></div>
    </a>

    <a href="ar.html" class="nav-item active">
      <i class="fa-solid fa-vr-cardboard"></i>
      <span>AR</span>
      <div class="nav-dot"></div>
    </a>

    <a href="servicios.html" class="nav-item">
      <i class="fa-solid fa-bars"></i>
      <span>Servicios</span>
      <div class="nav-dot"></div>
    </a>
  </nav>
</body>
</html>
