<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mapa AR - Universidad</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #boton-regresar { position: absolute; top: 20px; left: 20px; z-index: 999; padding: 10px 20px; background: white; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; }
    </style>
  </head>
  <body>
    <button id="boton-regresar" onclick="window.location.href='index.html'">⬅ Volver al Mapa 2D</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-plane position="-0.5 0.2 0" width="0.8" height="0.3" color="#D81B60" opacity="0.8" class="clickable">
          <a-text value="Edificio D\nToca para info" align="center" position="0 0 0.1" color="white"></a-text>
        </a-plane>

        <a-plane position="-0.2 -0.4 0" width="0.8" height="0.3" color="#5C93D1" opacity="0.8" class="clickable">
          <a-text value="Edificio A\nToca para info" align="center" position="0 0 0.1" color="white"></a-text>
        </a-plane>

      </a-entity>
    </a-scene>
  </body>
</html>
