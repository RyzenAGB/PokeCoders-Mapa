<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Motor AR - PokeCoders</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Botón de prueba para salir de la AR */
      #btn-cerrar-ar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; padding: 15px 30px; background: #1b365d; color: white; border-radius: 20px; font-weight: bold; border: none; }
        /* Forzar que la cámara ocupe todo el espacio disponible */
        #vista-ar, a-scene {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        /* El botón de cerrar debe flotar sobre todo lo demás */
        #btn-cerrar-ar {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999; /* Muy alto para que no lo tape la cámara */
            padding: 12px 24px;
            background-color: #1b365d; /* Azul institucional */
            color: white;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
  </head>
  <body>
        <div id="vista-ar">
    <button id="btn-cerrar-ar" onclick="desactivarAR()">Cerrar AR</button>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: #scanning-overlay;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
        
        <a-plane class="clickable" position="-0.4 0.15 0.01" width="0.25" height="0.1" color="#A12E60" opacity="0.9" 
                onclick="window.parent.mostrarInfo('edificio-d')">
            <a-text value="INFO EDIF. D" align="center" position="0 0 0.02" scale="0.15 0.15 0.15"></a-text>
        </a-plane>

        <a-plane class="clickable" position="-0.3 -0.1 0.01" width="0.25" height="0.1" color="#EDC045" opacity="0.9" 
                onclick="window.parent.mostrarInfo('edificio-a')">
            <a-text value="INFO EDIF. A" align="center" position="0 0 0.02" scale="0.15 0.15 0.15"></a-text>
        </a-plane>

        <a-plane class="clickable" position="0.1 0.1 0.01" width="0.25" height="0.1" color="#44AC63" opacity="0.9" 
                onclick="window.parent.mostrarInfo('edificio-c')">
            <a-text value="INFO EDIF. C" align="center" position="0 0 0.02" scale="0.15 0.15 0.15"></a-text>
        </a-plane>

        </a-entity>
    </a-scene>
    </div>

    <script>
      // Esta función simula la del Dev 3 por ahora, para que pruebes que tus clics funcionan
      window.mostrarInfo = function(id) {
        console.log("¡Disparaste el AR para el " + id + "!");
        alert("La AR detectó el clic en: " + id);
      };
    </script>
  </body>
</html>
