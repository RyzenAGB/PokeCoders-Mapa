<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Motor AR - PokeCoders</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Botón de prueba para salir de la AR */
      #btn-cerrar-ar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; padding: 15px 30px; background: #1b365d; color: white; border-radius: 20px; font-weight: bold; border: none; }
    </style>
  </head>
  <body>
    <button id="btn-cerrar-ar" onclick="alert('Aquí el Dev 3 conectará su función para volver al mapa SVG')">Cerrar AR</button>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            
            <a-plane class="clickable" position="-0.45 0.15 0" width="0.22" height="0.09" color="#D81B60" opacity="0.85" 
                    onclick="window.parent.mostrarInfo('edificio-d')">
            <a-text value="Edificio D" align="center" position="0 0 0.02" scale="0.12 0.12 0.12" color="white"></a-text>
            </a-plane>

            <a-plane class="clickable" position="-0.3 -0.15 0" width="0.22" height="0.09" color="#5C93D1" opacity="0.85" 
                    onclick="window.parent.mostrarInfo('edificio-a')">
            <a-text value="Edificio A" align="center" position="0 0 0.02" scale="0.12 0.12 0.12" color="white"></a-text>
            </a-plane>

            <a-plane class="clickable" position="-0.05 -0.15 0" width="0.22" height="0.09" color="#8CC63F" opacity="0.85" 
                    onclick="window.parent.mostrarInfo('edificio-b')">
            <a-text value="Edificio B" align="center" position="0 0 0.02" scale="0.12 0.12 0.12" color="white"></a-text>
            </a-plane>

            <a-plane class="clickable" position="-0.15 0.1 0" width="0.22" height="0.09" color="#F7931E" opacity="0.85" 
                    onclick="window.parent.mostrarInfo('edificio-c')">
            <a-text value="Edificio C" align="center" position="0 0 0.02" scale="0.12 0.12 0.12" color="white"></a-text>
            </a-plane>

            <a-plane class="clickable" position="0.15 0.35 0" width="0.22" height="0.09" color="#8c52ff" opacity="0.85" 
                    onclick="window.parent.mostrarInfo('edificio-e')">
            <a-text value="Edificio E" align="center" position="0 0 0.02" scale="0.12 0.12 0.12" color="white"></a-text>
            </a-plane>

            <a-plane class="clickable" position="0.35 0.15 0" width="0.22" height="0.09" color="#FBB03B" opacity="0.85" 
                    onclick="window.parent.mostrarInfo('edificio-f')">
            <a-text value="Edificio F" align="center" position="0 0 0.02" scale="0.12 0.12 0.12" color="white"></a-text>
            </a-plane>

            <a-plane class="clickable" position="0.55 -0.1 0" width="0.22" height="0.09" color="#29ABE2" opacity="0.85" 
                    onclick="window.parent.mostrarInfo('edificio-g')">
            <a-text value="Edificio G" align="center" position="0 0 0.02" scale="0.12 0.12 0.12" color="white"></a-text>
            </a-plane>

        </a-entity>
        </a-scene>

    <script>
      // Esta función simula la del Dev 3 por ahora, para que pruebes que tus clics funcionan
      window.mostrarInfo = function(id) {
        console.log("¡Disparaste el AR para el " + id + "!");
        alert("La AR detectó el clic en: " + id);
      };
    </script>
  </body>
</html>
